<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Video Player | HLS, DASH, MP4</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- HLS.js for .m3u8 -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- Dash.js for .mpd -->
    <script src="https://cdn.jsdelivr.net/npm/dashjs/dist/dash.all.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #fff; }
        
        .video-container:hover .video-controls { opacity: 1; }
        .video-controls { 
            transition: opacity 0.3s ease-in-out;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
        }
        
        input[type=range] { cursor: pointer; }
        
        /* Loading Spinner */
        .loader {
            border-top-color: #3b82f6;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Header -->
    <header class="w-full max-w-4xl mb-6 text-center">
        <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
            Ultimate Video Player
        </h1>
        <p class="text-gray-400 text-sm mt-2">Supports HLS, DASH, MP4, and M4V</p>
    </header>

    <!-- Main Player Section -->
    <main class="w-full max-w-4xl">
        <div class="relative group video-container bg-black rounded-2xl overflow-hidden shadow-2xl border border-gray-800">
            
            <!-- Video Element -->
            <video id="video-player" class="w-full aspect-video" playsinline></video>

            <!-- Loading State -->
            <div id="loading-overlay" class="absolute inset-0 flex items-center justify-center bg-black/50 z-10 hidden">
                <div class="loader w-12 h-12 border-4 border-gray-600 rounded-full"></div>
            </div>

            <!-- Custom Controls -->
            <div class="video-controls absolute bottom-0 left-0 right-0 p-4 opacity-0 lg:group-hover:opacity-100 flex flex-col gap-2 z-20">
                
                <!-- Progress Bar -->
                <div class="w-full h-1 bg-gray-600 rounded-full relative cursor-pointer" id="progress-container">
                    <div id="progress-bar" class="absolute top-0 left-0 h-full bg-blue-500 rounded-full" style="width: 0%"></div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <button id="play-pause" class="hover:text-blue-400 transition-colors">
                            <i data-lucide="play" class="w-6 h-6" id="play-icon"></i>
                        </button>
                        
                        <div class="flex items-center gap-2">
                            <button id="mute-toggle" class="hover:text-blue-400 transition-colors">
                                <i data-lucide="volume-2" class="w-5 h-5" id="volume-icon"></i>
                            </button>
                            <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1" class="w-20 accent-blue-500">
                        </div>

                        <span class="text-xs font-mono text-gray-300" id="time-display">00:00 / 00:00</span>
                    </div>

                    <div class="flex items-center gap-4">
                        <button id="share-btn" class="hover:text-blue-400 transition-colors">
                            <i data-lucide="share-2" class="w-5 h-5"></i>
                        </button>
                        <button id="fullscreen-btn" class="hover:text-blue-400 transition-colors">
                            <i data-lucide="maximize" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- URL Input & Share Actions -->
        <div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800">
                <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <i data-lucide="link" class="w-5 h-5 text-blue-400"></i> Change Stream
                </h2>
                <div class="flex flex-col gap-3">
                    <input type="text" id="url-input" placeholder="Paste .m3u8, .mpd, or .mp4 URL" 
                           class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="loadNewSource()" class="bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg font-semibold transition-all">
                        Load Video
                    </button>
                </div>
            </div>

            <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800">
                <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <i data-lucide="share-2" class="w-5 h-5 text-purple-400"></i> Quick Share
                </h2>
                <div class="flex gap-2">
                    <button onclick="shareLink('twitter')" class="flex-1 bg-sky-500 hover:bg-sky-600 p-2 rounded-lg text-sm flex items-center justify-center gap-1">
                        Twitter
                    </button>
                    <button onclick="shareLink('copy')" class="flex-1 bg-gray-700 hover:bg-gray-600 p-2 rounded-lg text-sm flex items-center justify-center gap-1">
                        Copy URL
                    </button>
                </div>
                <div id="copy-toast" class="mt-2 text-center text-xs text-green-400 opacity-0 transition-opacity">Link copied!</div>
            </div>
        </div>
    </main>

    <footer class="mt-auto py-8 text-gray-500 text-xs text-center">
        Powered by HLS.js & Dash.js | Mobile Responsive Engine
    </footer>

    <script>
        const video = document.getElementById('video-player');
        const playPauseBtn = document.getElementById('play-pause');
        const playIcon = document.getElementById('play-icon');
        const muteBtn = document.getElementById('mute-toggle');
        const volumeIcon = document.getElementById('volume-icon');
        const volumeSlider = document.getElementById('volume-slider');
        const timeDisplay = document.getElementById('time-display');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const urlInput = document.getElementById('url-input');
        const loader = document.getElementById('loading-overlay');

        let hlsInstance = null;
        let dashInstance = null;

        // Initialize Icons
        lucide.createIcons();

        // 1. Core Playback Logic
        function loadVideo(url) {
            if (!url) return;
            
            loader.classList.remove('hidden');
            
            // Clean up previous instances
            if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
            if (dashInstance) { dashInstance.reset(); dashInstance = null; }

            const extension = url.split(/[#?]/)[0].split('.').pop().trim().toLowerCase();

            if (extension === 'm3u8') {
                if (Hls.isSupported()) {
                    hlsInstance = new Hls();
                    hlsInstance.loadSource(url);
                    hlsInstance.attachMedia(video);
                    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                        video.play();
                        loader.classList.add('hidden');
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                    video.addEventListener('loadedmetadata', () => video.play());
                }
            } else if (extension === 'mpd') {
                dashInstance = dashjs.MediaPlayer().create();
                dashInstance.initialize(video, url, true);
                loader.classList.add('hidden');
            } else {
                // Standard MP4/M4V
                video.src = url;
                video.load();
                video.play().catch(() => { /* Auto-play blocked */ });
                loader.classList.add('hidden');
            }
            
            urlInput.value = url;
        }

        // 2. URL Parameter Handling
        function checkURLParams() {
            const params = new URLSearchParams(window.location.search);
            const src = params.get('src');
            if (src) {
                loadVideo(src);
            } else {
                // Fallback demo video (Big Buck Bunny)
                loadVideo('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8');
            }
        }

        // 3. UI Controls
        playPauseBtn.addEventListener('click', () => {
            if (video.paused) {
                video.play();
                updateIcon('play-icon', 'pause');
            } else {
                video.pause();
                updateIcon('play-icon', 'play');
            }
        });

        video.addEventListener('timeupdate', () => {
            const progress = (video.currentTime / video.duration) * 100;
            progressBar.style.width = `${progress}%`;
            timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
        });

        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            video.currentTime = pos * video.duration;
        });

        volumeSlider.addEventListener('input', (e) => {
            video.volume = e.target.value;
            video.muted = (video.volume === 0);
            updateVolumeIcon();
        });

        muteBtn.addEventListener('click', () => {
            video.muted = !video.muted;
            updateVolumeIcon();
        });

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                video.parentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // 4. Utility Functions
        function formatTime(seconds) {
            if (isNaN(seconds)) return "00:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function updateIcon(id, iconName) {
            const el = document.getElementById(id);
            el.setAttribute('data-lucide', iconName);
            lucide.createIcons();
        }

        function updateVolumeIcon() {
            let icon = 'volume-2';
            if (video.muted || video.volume === 0) icon = 'volume-x';
            else if (video.volume < 0.5) icon = 'volume-1';
            updateIcon('volume-icon', icon);
        }

        function loadNewSource() {
            const val = urlInput.value.trim();
            if (val) {
                loadVideo(val);
                // Update URL without reloading page
                const newUrl = new URL(window.location);
                newUrl.searchParams.set('src', val);
                window.history.pushState({}, '', newUrl);
            }
        }

        function shareLink(platform) {
            const currentUrl = window.location.href;
            if (platform === 'twitter') {
                window.open(`https://twitter.com/intent/tweet?text=Watching this video: ${currentUrl}`);
            } else if (platform === 'copy') {
                const dummy = document.createElement('input');
                document.body.appendChild(dummy);
                dummy.value = currentUrl;
                dummy.select();
                document.execCommand('copy');
                document.body.removeChild(dummy);
                
                const toast = document.getElementById('copy-toast');
                toast.style.opacity = '1';
                setTimeout(() => toast.style.opacity = '0', 2000);
            }
        }

        // Initialize on load
        window.onload = checkURLParams;
    </script>
</body>
</html>
